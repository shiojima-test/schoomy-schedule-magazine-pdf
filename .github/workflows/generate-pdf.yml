name: Generate Schedule PDF (Magazine)

on:
  repository_dispatch:
    types: [generate-pdf]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install M PLUS 2 font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-mplus
          fc-cache -fv
          fc-list | grep -i "m plus 2" | head -5

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Generate PDF
        run: python src/generate_pdf.py --output schedule.pdf

      - name: Upload to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python upload_to_drive.py schedule.pdf
